name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Adjust this to your main branch name if different
    paths:
      - 'src/**'
      - '.eleventy.js'
      - 'package.json'
  workflow_run:
    workflows: ["Sync LeetCode"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: |
          npx @11ty/eleventy
          [ -d "_site" ] && ls -R _site || echo "_site directory not found!"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
